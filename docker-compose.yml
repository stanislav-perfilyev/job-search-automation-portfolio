name: jobsearch

services:
  # ── FastAPI (dev: hot reload) ──────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://jobuser:jobpass@postgres:5432/jobsearch
      - REDIS_URL=redis://redis:6379/0
      - API_TOKEN=${API_TOKEN:-dev-token-change-me}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SCHEDULER_BRIEF_TIME=${SCHEDULER_BRIEF_TIME:-05:15}
      - PORT=8000
      - DEBUG=true
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app          # hot reload
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── APScheduler (morning_brief по расписанию) ─────────────────────────
  scheduler:
    build: .
    command: python run_scheduler.py
    environment:
      - DATABASE_URL=postgresql://jobuser:jobpass@postgres:5432/jobsearch
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SCHEDULER_BRIEF_TIME=${SCHEDULER_BRIEF_TIME:-05:15}
      - API_TOKEN=${API_TOKEN:-dev-token-change-me}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB:       jobsearch
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobuser -d jobsearch"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
