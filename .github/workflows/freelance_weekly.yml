name: Freelance Weekly Pipeline Report

on:
  schedule:
    # Каждое воскресенье 08:00 UTC = 13:00 Алматы
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Run Weekly Pipeline Report
        env:
          FREELANCE_SPREADSHEET_ID: ${{ secrets.FREELANCE_SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL:             ${{ secrets.DATABASE_URL }}
          UPWORK_CONNECTS_INITIAL:  ${{ secrets.UPWORK_CONNECTS_INITIAL }}
          PYTHONPATH:               .
        run: python automation/freelance_report.py --weekly
