name: WinAPI Showcase CI

on:
  push:
    paths:
      - 'portfolio/winapi_showcase/**'
  pull_request:
    paths:
      - 'portfolio/winapi_showcase/**'
  workflow_dispatch: {}

jobs:
  build:
    name: Build & Test (Windows / MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        working-directory: portfolio/winapi_showcase
        run: cmake -B build -A x64

      - name: Build
        working-directory: portfolio/winapi_showcase
        run: cmake --build build --config Release --parallel

      - name: Run tests
        working-directory: portfolio/winapi_showcase
        run: ctest --test-dir build -C Release --output-on-failure

      - name: cppcheck
        run: choco install cppcheck -y --no-progress

      - name: Run cppcheck
        working-directory: portfolio/winapi_showcase
        shell: bash
        run: |
          # Chocolatey's cppcheck.exe is a shim (in C:\ProgramData\chocolatey\bin)
          # that re-launches the real binary. cppcheck locates its std.cfg etc.
          # relative to argv[0] at startup — through the shim that resolves to
          # the shim's own directory instead of the real install dir, so it
          # can't find "std.cfg" even though the file exists on disk. Calling
          # the real installed exe directly sidesteps the shim entirely.
          CPPCHECK="/c/Program Files/Cppcheck/cppcheck.exe"
          "$CPPCHECK" \
            --enable=all \
            --std=c++17 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=unmatchedSuppression \
            --suppress=checkersReport \
            --error-exitcode=1 \
            --quiet \
            01_ProcessMonitor/ 02_FileWatcher/ 03_NamedPipeIPC/ common/ tests/
